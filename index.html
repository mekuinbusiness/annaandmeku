<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna & Meklit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FDFBF7;
            --text: #334039;
            --button-bg: #7A997F;
            --button-hover: #5E7B63;
            --button-text: #FFFFFF;
            --accent-gold: #C5A059;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .intro-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 100vw;
            min-height: 100vh;
            padding: 0;
            border-radius: 0;
            background: linear-gradient(180deg, #F9F5EE 0%, #EDE5D9 100%);
        }

        .seal-wrapper {
            position: relative;
            width: 100%;
            padding: 0 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .seal-wrapper::before {
            content: '';
            position: absolute;
            left: 16px;
            right: 16px;
            top: 50%;
            height: 62px;
            transform: translateY(-50%);
            background: rgba(249, 243, 233, 0.82);
            border: 1px solid rgba(255,255,255,0.85);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8);
            border-radius: 40px;
            z-index: 0;
        }

        .seal-button {
            width: 220px;
            height: 220px;
            border-radius: 40px;
            background: url('images/seal.png') center/110% no-repeat;
            background-color: transparent;
            border: none;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(79, 94, 77, 0.12);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding: 0;
            z-index: 1;
        }

        .seal-button:hover,
        .seal-button:focus-visible {
            transform: scale(1.04);
            box-shadow: 0 26px 64px rgba(79, 94, 77, 0.16);
        }



        .curtain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .curtain.opening {
            opacity: 1;
        }

        .curtain-panel {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: #F4F5EA;
            transition: transform 1.1s ease;
            transform-origin: center;
            transform: scaleX(0);
        }

        .curtain-panel.left {
            left: 0;
            transform-origin: right;
        }

        .curtain-panel.right {
            right: 0;
            transform-origin: left;
        }

        .curtain.opening .curtain-panel.left,
        .curtain.opening .curtain-panel.right {
            transform: scaleX(1);
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-style: italic;
            margin-bottom: 40px;
            color: var(--text);
        }

    </style>
</head>
<body>
    <div class="intro-container">
        <div class="seal-wrapper">
            <button class="seal-button" id="openInvitation" aria-label="Open invitation"></button>
        </div>
    </div>

    <div class="curtain" id="curtain">
        <div class="curtain-panel left"></div>
        <div class="curtain-panel right"></div>
    </div>

    <script>
        const curtain = document.getElementById('curtain');
        const opener = document.getElementById('openInvitation');

        opener.addEventListener('click', function() {
            opener.style.pointerEvents = 'none';
            curtain.classList.add('opening');
            setTimeout(() => {
                window.location.href = 'invitation.html';
            }, 1100);
        });
    </script>
</body>
</html>
