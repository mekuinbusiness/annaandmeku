                    <label class="form-label" data-i18n="form-name">Your Name</label>
                    <input type="text" class="input-field" required placeholder="Enter your full name" data-i18n-ph="ph-name">
                </div>

                <div class="form-group">
                    <label class="form-label" data-i18n="form-attend">Will you attend?</label>
                    
                    <label class="radio-option">
                        <input type="radio" name="attendance" value="yes" checked>
                        <span class="custom-mark"></span>
                        <span data-i18n="attend-yes">Yes, I will!</span>
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="attendance" value="no">
                        <span class="custom-mark"></span>
                        <span data-i18n="attend-no">Unfortunately, I cannot</span>
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="attendance" value="later">
                        <span class="custom-mark"></span>
                        <span data-i18n="attend-later">I will tell you a bit later</span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label" data-i18n="form-message">Message to the bride &amp; groom</label>
                    <textarea class="input-field message-field" rows="3" placeholder="Write your message here…" data-i18n-ph="ph-message"></textarea>
                </div>

                <button type="submit" class="submit-btn" data-i18n="submit-btn">SUBMIT</button>
            </form>
        </section>

    </div>

    <script src="invitation.js"></script>
</body>
</html>
